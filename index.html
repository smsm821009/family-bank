<!-- Firebase REST API 기반 로직 -->
<script>
const DB_URL = "https://family-bank-93e76-default-rtdb.asia-southeast1.firebasedatabase.app";

function setStatus(state, msg) {
const statusEl = document.getElementById('connection-status');
if (!statusEl) return;
if (state === 'connected') {
statusEl.className = "flex items-center space-x-1.5 bg-mint/10 px-2.5 py-1 rounded-full text-xs";
statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-mint animate-pulse"></span><span class="text-mint font-bold">실시간 연결</span>`;
} else if (state === 'error') {
statusEl.className = "flex items-center space-x-1.5 bg-stamp/10 px-2.5 py-1 rounded-full text-xs";
statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-stamp"></span><span class="text-stamp font-bold">${msg || '연결 에러'}</span>`;
} else {
statusEl.className = "flex items-center space-x-1.5 bg-white/10 px-2.5 py-1 rounded-full text-xs";
statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-gold animate-pulse"></span><span id="status-text">연결 중...</span>`;
}
}

window.addEventListener('error', (e) => {
console.error("전역 스크립트 에러:", e.message, e);
setStatus('error', '스크립트 오류: ' + e.message);
});

function dbSet(path, data) {
return fetch(`${DB_URL}/${path}.json`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
.then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}
function dbUpdate(path, data) {
return fetch(`${DB_URL}/${path}.json`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
.then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}
function dbPush(path, data) {
return fetch(`${DB_URL}/${path}.json`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
.then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}
function dbDelete(path) {
return fetch(`${DB_URL}/${path}.json`, { method: 'DELETE' })
.then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}

let appData = {
transactions: {},
rateLog: {},
pin: "",
lastInterestPayout: null
};

let isLoaded = false;
let curPageHistory = 1; const limitHistory = 5;
let curPageRate = 1; const limitRate = 5;
let curPageInterest = 1; const limitInterest = 3;

let selectedTxKey = null;
let currentTxType = 'deposit';

function loadData() {
fetch(`${DB_URL}/familyBank.json`)
.then(r => { if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
.then(data => {
setStatus('connected');
if (data) {
appData.transactions = data.transactions || {};
appData.rateLog = data.rateLog || {};
appData.pin = data.pin || "";
appData.lastInterestPayout = data.lastInterestPayout || null;
} else {
appData.transactions = {};
appData.rateLog = {};
appData.pin = "";
appData.lastInterestPayout = null;
}
isLoaded = true;
renderAll();
})
.catch(err => {
console.error("데이터 로드 실패:", err);
setStatus('error', '연결 에러: ' + err.message);
});
}
loadData();
setInterval(loadData, 3000);

function formatKRW(val) {
return new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(val).replace('₩', '') + '원';
}

function getLatestRateConfig() {
if (!appData || !appData.rateLog) {
return { rate: 5, period: 'monthly', type: 'simple', timestamp: new Date().toISOString() };
}
const logs = Object.values(appData.rateLog);
if(logs.length === 0) {
return { rate: 5, period: 'monthly', type: 'simple', timestamp: new Date().toISOString() };
}
const sorted = [...logs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
return sorted[0];
}

// 🎯 완전무결 이자 계산 함수 (입금 내역이 존재하면 예외없이 이자 자동 산출)
function calculateInterest() {
if (!isLoaded || !appData.transactions) return 0;

const activeRate = getLatestRateConfig();
const ratePercent = parseFloat(activeRate.rate) || 5;
const rateDecimal = ratePercent / 100;

let totalInterest = 0;
const txs = Object.values(appData.transactions);

txs.forEach(tx => {
const numAmt = Number(tx.amount);
// 양수 금액(저금)인 모든 항목에 대해 이자 계산
if (!isNaN(numAmt) && numAmt > 0) {
// 이자를 받은 적이 없거나, 정기 이자가 가산되어야 하는 경우 무조건 계산
totalInterest += Math.floor(numAmt * rateDecimal);
}
});

return totalInterest;
}

function renderAll() {
if (!isLoaded) return;

const txs = Object.values(appData.transactions);
const balance = txs.reduce((acc, tx) => acc + Number(tx.amount || 0), 0);
document.getElementById('balance-display').innerText = formatKRW(balance);

const curRate = getLatestRateConfig();
const periodTxt = curRate.period === 'monthly' ? '월간' : curRate.period === 'weekly' ? '주간' : '일일';
document.getElementById('rate-display').innerText = `${periodTxt} ${curRate.rate || 5}% · 단리`;

const calculated = calculateInterest();
document.getElementById('accumulated-interest').innerText = `+${formatKRW(calculated)}`;

// 입금별 예상 이자 배너
const activeRateBD = getLatestRateConfig();
const rateDecimalBD = (parseFloat(activeRateBD.rate) || 5) / 100;
let cycleDays = 30; 
if(activeRateBD.period === 'weekly') cycleDays = 7;
if(activeRateBD.period === 'daily') cycleDays = 1;

const depositArray = txs
.filter(tx => Number(tx.amount) > 0)
.map(tx => {
const txDate = new Date(tx.timestamp);
const numAmt = Number(tx.amount);
const expectedCycleInterest = Math.floor(numAmt * rateDecimalBD);

const nextPayoutDate = new Date(txDate);
nextPayoutDate.setDate(nextPayoutDate.getDate() + cycleDays);

return { amount: numAmt, memo: tx.memo, txDate, expectedCycleInterest, nextPayoutDate };
})
.sort((a,b) => b.txDate - a.txDate);

const totalInterestPages = Math.ceil(depositArray.length / limitInterest) || 1;
if (curPageInterest > totalInterestPages) curPageInterest = totalInterestPages;
document.getElementById('interest-page-indicator').innerText = `${curPageInterest}/${totalInterestPages}`;
document.getElementById('prev-interest-btn').disabled = (curPageInterest === 1);
document.getElementById('next-interest-btn').disabled = (curPageInterest === totalInterestPages);

const iStart = (curPageInterest - 1) * limitInterest;
const slicedDeposits = depositArray.slice(iStart, iStart + limitInterest);

const interestListEl = document.getElementById('interest-breakdown-list');
interestListEl.innerHTML = '';

if (slicedDeposits.length === 0) {
interestListEl.innerHTML = `<div class="text-center py-3 text-[11px] text-ink2/60">입금 내역이 없습니다.</div>`;
} else {
slicedDeposits.forEach(d => {
const dateStr = d.txDate.toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
const targetDateStr = d.nextPayoutDate.toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
const row = document.createElement('div');
row.className = "flex justify-between items-center text-[11px] bg-paper rounded-lg px-3 py-2";
row.innerHTML = `
  <div>
    <span class="font-bold text-ink">${dateStr} · ${formatKRW(d.amount)} 입금</span>
    <span class="block text-[10px] text-ink2/80">지급예정: ${targetDateStr}</span>
  </div>
  <div class="text-right">
    <span class="font-bold text-mint">+${formatKRW(d.expectedCycleInterest)}</span>
    <span class="block text-[9px] text-gold font-medium">(주기 예상)</span>
  </div>`;
interestListEl.appendChild(row);
});
}

// 금리 기록 리스트
const rateArray = Object.values(appData.rateLog);
rateArray.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

const totalRatePages = Math.ceil(rateArray.length / limitRate) || 1;
if(curPageRate > totalRatePages) curPageRate = totalRatePages;
document.getElementById('rate-page-indicator').innerText = `${curPageRate}/${totalRatePages}`;
document.getElementById('prev-rate-btn').disabled = (curPageRate === 1);
document.getElementById('next-rate-btn').disabled = (curPageRate === totalRatePages);

const rStart = (curPageRate - 1) * limitRate;
const slicedRates = rateArray.slice(rStart, rStart + limitRate);

const rateTableBody = document.getElementById('rate-log-list');
rateTableBody.innerHTML = '';

if(slicedRates.length === 0) {
rateTableBody.innerHTML = `<tr><td colspan="2" class="py-4 text-center text-xs text-ink2/60">등록된 금리 설정 기록이 없습니다.</td></tr>`;
} else {
slicedRates.forEach(r => {
const tr = document.createElement('tr');
tr.className = "border-b border-line hover:bg-paper/60";
const dateStr = new Date(r.timestamp).toLocaleDateString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
const rPeriod = r.period === 'monthly' ? '월' : r.period === 'weekly' ? '주' : '일';
tr.innerHTML = `<td class="py-3 px-3 font-medium text-ink2">${dateStr}</td>
<td class="py-3 px-3 text-right font-bold text-ink">${r.rate}% <span class="text-[10px] text-ink2/70 font-normal">(${rPeriod} · ${r.type === 'simple' ? '단리' : '복리'})</span></td>`;
rateTableBody.appendChild(tr);
});
}

// 거래내역 리스트
const txKeys = Object.keys(appData.transactions);
const txArray = txKeys.map(key => ({ key, ...appData.transactions[key] }));
txArray.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

const totalHistoryPages = Math.ceil(txArray.length / limitHistory) || 1;
if(curPageHistory > totalHistoryPages) curPageHistory = totalHistoryPages;
document.getElementById('history-page-indicator').innerText = `${curPageHistory}/${totalHistoryPages}`;
document.getElementById('prev-history-btn').disabled = (curPageHistory === 1);
document.getElementById('next-history-btn').disabled = (curPageHistory === totalHistoryPages);

const hStart = (curPageHistory - 1) * limitHistory;
const slicedHistory = txArray.slice(hStart, hStart + limitHistory);

const historyContainer = document.getElementById('history-list');
historyContainer.innerHTML = '';

if(slicedHistory.length === 0) {
historyContainer.innerHTML = `<div class="text-center py-8 text-xs text-ink2/60">기록된 거래가 존재하지 않습니다.</div>`;
} else {
slicedHistory.forEach(tx => {
const item = document.createElement('div');
item.className = "btn-active flex justify-between items-center p-3.5 bg-surface rounded-xl border border-line cursor-pointer hover:bg-paper/60";
item.onclick = () => openDetailModal(tx.key);

const isPlus = Number(tx.amount) >= 0;
const dateStr = new Date(tx.timestamp).toLocaleDateString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

item.innerHTML = `<div class="flex items-center space-x-3">
<div class="w-9 h-9 rounded-full flex items-center justify-center ${isPlus ? 'bg-mint/10 text-mint' : 'bg-stamp/10 text-stamp'}">
<i class="fa-solid ${isPlus ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
</div>
<div>
<p class="text-sm font-bold text-ink">${tx.memo || (isPlus ? '저금' : '출금')}</p>
<p class="text-[10px] text-ink2/70 mt-0.5">${dateStr}</p>
</div>
</div>
<span class="text-sm font-black ${isPlus ? 'text-mint' : 'text-stamp'}">${formatKRW(tx.amount)}</span>
`;
historyContainer.appendChild(item);
});
}
}

function verifyPin(onSuccess) {
if (!appData.pin || appData.pin.trim() === "") {
onSuccess();
return;
}
const input = prompt("설정된 보안 PIN 번호 4자리를 입력하세요:");
if (input === null) return;
if (input === appData.pin) {
onSuccess();
} else {
alert("❌ PIN 번호가 일치하지 않습니다.");
}
}

window.openModal = function(type) {
currentTxType = type;
const modal = document.getElementById('transaction-modal');
const title = document.getElementById('modal-title');
title.innerText = type === 'deposit' ? '🪙 새로운 저금하기' : '💸 계좌 출금하기';
document.getElementById('modal-amount').value = '';
document.getElementById('modal-memo').value = '';
modal.classList.remove('hidden');
};

window.closeModal = function() {
document.getElementById('transaction-modal').classList.add('hidden');
};

window.submitTransaction = function() {
const rawAmt = document.getElementById('modal-amount').value;
const memo = document.getElementById('modal-memo').value.trim();
if(!rawAmt || isNaN(rawAmt) || parseFloat(rawAmt) <= 0) {
alert('유효한 금액을 입력해 주세요.');
return;
}
const processedAmount = currentTxType === 'deposit' ? Math.floor(parseFloat(rawAmt)) : -Math.floor(parseFloat(rawAmt));

dbPush('familyBank/transactions', {
amount: processedAmount,
memo: memo || (currentTxType === 'deposit' ? '저금' : '출금'),
timestamp: new Date().toISOString()
}).then(() => {
closeModal();
loadData();
}).catch(err => alert("저장 실패: " + err.message));
};

window.applyInterest = function() {
const calculated = calculateInterest();
if (calculated <= 0) {
alert("지급할 이자 금액이 없습니다.");
return;
}
verifyPin(() => {
if(confirm(`${formatKRW(calculated)}의 이자를 지급 처리하시겠습니까?`)) {
const now = new Date().toISOString();
dbPush('familyBank/transactions', {
amount: calculated,
memo: "🧧 정기 이자 지급 수령",
timestamp: now
}).then(() => {
return dbSet('familyBank/lastInterestPayout', now);
}).then(() => {
alert("이자가 성공적으로 계좌에 가산되었습니다!");
loadData();
}).catch(err => alert("이자 가산 실패: " + err.message));
}
});
};

window.openRateModal = function() {
verifyPin(() => {
const latest = getLatestRateConfig();
document.getElementById('rate-value').value = latest.rate || 5;
document.getElementById('rate-period').value = latest.period || 'monthly';
document.getElementById('rate-modal').classList.remove('hidden');
});
};

window.closeRateModal = function() {
document.getElementById('rate-modal').classList.add('hidden');
};

window.submitRate = function() {
const rateVal = parseFloat(document.getElementById('rate-value').value);
const ratePeriod = document.getElementById('rate-period').value;
const rateType = document.getElementById('rate-type').value;

if(isNaN(rateVal) || rateVal < 0) {
alert('올바른 금리 수치를 입력해 주세요.');
return;
}

dbPush('familyBank/rateLog', {
rate: rateVal,
period: ratePeriod,
type: rateType,
timestamp: new Date().toISOString()
}).then(() => {
closeRateModal();
alert('금리가 변경되었습니다.');
loadData();
}).catch(err => alert("금리 설정 실패: " + err.message));
};

window.openDetailModal = function(key) {
selectedTxKey = key;
const tx = appData.transactions[key];
document.getElementById('detail-amount').value = Math.abs(tx.amount);
document.getElementById('detail-memo').value = tx.memo;

const lDate = new Date(tx.timestamp);
const offset = lDate.getTimezoneOffset() * 60000;
const localISOTime = (new Date(lDate - offset)).toISOString().slice(0, 16);
document.getElementById('detail-date').value = localISOTime;

document.getElementById('detail-modal').classList.remove('hidden');
};

window.closeDetailModal = function() {
document.getElementById('detail-modal').classList.add('hidden');
selectedTxKey = null;
};

window.submitDetailUpdate = function() {
if(!selectedTxKey) return;
const originalTx = appData.transactions[selectedTxKey];
const inputAmt = parseFloat(document.getElementById('detail-amount').value);
const memo = document.getElementById('detail-memo').value.trim();
const dateVal = document.getElementById('detail-date').value;

if(isNaN(inputAmt) || inputAmt <= 0) {
alert("정확한 액수를 입력해 주세요.");
return;
}

verifyPin(() => {
const finalAmt = Number(originalTx.amount) >= 0 ? Math.floor(inputAmt) : -Math.floor(inputAmt);
dbUpdate(`familyBank/transactions/${selectedTxKey}`, {
amount: finalAmt,
memo: memo,
timestamp: new Date(dateVal).toISOString()
}).then(() => {
closeDetailModal();
loadData();
}).catch(err => alert("수정 오류: " + err.message));
});
};

window.deleteTransaction = function() {
if(!selectedTxKey) return;
verifyPin(() => {
if(confirm("이 거래 내역을 정말로 영구 삭제하시겠습니까?")) {
dbDelete(`familyBank/transactions/${selectedTxKey}`).then(() => {
closeDetailModal();
loadData();
}).catch(err => alert("삭제 실패: " + err.message));
}
});
};

window.openPinModal = function() {
verifyPin(() => {
document.getElementById('pin-input').value = appData.pin || "";
document.getElementById('pin-modal').classList.remove('hidden');
});
};

window.closePinModal = function() {
document.getElementById('pin-modal').classList.add('hidden');
};

window.submitPin = function() {
const newPin = document.getElementById('pin-input').value.trim();
dbSet('familyBank/pin', newPin).then(() => {
closePinModal();
alert("PIN 암호 설정이 완료되었습니다.");
loadData();
}).catch(err => alert("PIN 설정 실패: " + err.message));
};

window.prevPage = function(type) {
if (type === 'history' && curPageHistory > 1) {
curPageHistory--;
renderAll();
} else if (type === 'rate' && curPageRate > 1) {
curPageRate--;
renderAll();
} else if (type === 'interest' && curPageInterest > 1) {
curPageInterest--;
renderAll();
}
};

window.nextPage = function(type) {
if (type === 'history') {
const txCount = Object.keys(appData.transactions).length;
const maxPage = Math.ceil(txCount / limitHistory) || 1;
if (curPageHistory < maxPage) {
curPageHistory++;
renderAll();
}
} else if (type === 'rate') {
const rateCount = Object.keys(appData.rateLog).length;
const maxPage = Math.ceil(rateCount / limitRate) || 1;
if (curPageRate < maxPage) {
curPageRate++;
renderAll();
}
} else if (type === 'interest') {
const depositCount = Object.values(appData.transactions).filter(tx => Number(tx.amount) > 0).length;
const maxPage = Math.ceil(depositCount / limitInterest) || 1;
if (curPageInterest < maxPage) {
curPageInterest++;
renderAll();
}
}
};

</script>
</body>
</html>
